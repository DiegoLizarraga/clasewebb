<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

  <div class="app-layout">

    <!-- barra lateral con iconos de navegación -->
    <nav class="sidebar">
      <div class="sidebar-item active" title="Calculator">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
      </div>
      <div class="sidebar-item" title="History" onclick="document.querySelector('.history-panel').classList.toggle('visible')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
    </nav>

    <!-- calculadora principal -->
    <div class="main-container">

      <div class="calc-header">
        <span class="calc-title">Calculadora</span>
      </div>

      <!-- pantalla: muestra la expresión arriba y el resultado abajo -->
      <div class="screen-wrap">
        <div class="screen-expr" id="screen-expr"></div>
        <div class="main-screen" id="screen">0</div>
      </div>

      <!-- fila de utilidades: limpiar, cambiar signo, porcentaje, borrar -->
      <div class="btn-container util-row">
        <button class="btn btn-util" onclick="handleClear()">AC</button>
        <button class="btn btn-util" onclick="handleToggleSign()">+/−</button>
        <button class="btn btn-util" onclick="handlePercent()">%</button>
        <button class="btn btn-util" onclick="handleBackspace()">⌫</button>
      </div>

      <!-- fila de exponentes: cuadrado, cubo, potencia libre y división -->
      <div class="btn-container">
        <button class="btn btn-fn" onclick="handleClick('^2')">x²</button>
        <button class="btn btn-fn" onclick="handleClick('^3')">x³</button>
        <button class="btn btn-fn" onclick="handleClick('^')">xʸ</button>
        <button class="btn btn-op" onclick="handleClick('/')">÷</button>
      </div>

      <!-- fila 7 8 9 y multiplicación -->
      <div class="btn-container">
        <button class="btn" onclick="handleClick('7')">7</button>
        <button class="btn" onclick="handleClick('8')">8</button>
        <button class="btn" onclick="handleClick('9')">9</button>
        <button class="btn btn-op" onclick="handleClick('x')">×</button>
      </div>

      <!-- fila 4 5 6 y resta -->
      <div class="btn-container">
        <button class="btn" onclick="handleClick('4')">4</button>
        <button class="btn" onclick="handleClick('5')">5</button>
        <button class="btn" onclick="handleClick('6')">6</button>
        <button class="btn btn-op" onclick="handleClick('-')">−</button>
      </div>

      <!-- fila 1 2 3 y suma -->
      <div class="btn-container">
        <button class="btn" onclick="handleClick('1')">1</button>
        <button class="btn" onclick="handleClick('2')">2</button>
        <button class="btn" onclick="handleClick('3')">3</button>
        <button class="btn btn-op" onclick="handleClick('+')">+</button>
      </div>

      <!-- fila del 0, punto decimal e igual -->
      <div class="btn-container">
        <button class="btn btn-zero" onclick="handleClick('0')">0</button>
        <button class="btn" onclick="handleClick('.')">.</button>
        <button class="btn btn-eq" onclick="calculate()">=</button>
      </div>

    </div>

    <!-- panel de historial: muestra las últimas operaciones -->
    <aside class="history-panel">
      <div class="history-header">
        <span class="history-title">RECENT ACTIVITY</span>
        <span class="history-badge" id="history-badge">0</span>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">No calculations yet</div>
      </div>
      <div class="full-history-btn">
        <button onclick="clearHistory()">CLEAR HISTORY</button>
      </div>
    </aside>

  </div>

  <script src="./script/script.js"></script>
</body>
</html>
